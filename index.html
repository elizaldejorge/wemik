<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Jorge Elizalde</title>
  <meta name="description" content="Jorge Elizalde — Technical Founder. iOS & web products. YABI, PMFC, PartyTab." />
  <meta name="theme-color" content="#ffffff" />

  <meta property="og:title" content="Jorge Elizalde — Technical Founder" />
  <meta property="og:description" content="I design, build, and ship iOS & web products." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://wemik.com" />

  <link rel="stylesheet" href="styles.css?v=5" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230071e3'/><text x='50' y='71' font-size='60' font-family='-apple-system,Helvetica,Arial,sans-serif' font-weight='600' fill='white' text-anchor='middle'>J</text></svg>" />
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <nav class="nav">
    <a href="#top" class="nav__logo"><em id="nav-name">Jorge</em></a>
    <div class="nav__links">
      <a href="#projects">Work</a>
      <a href="#contact" class="nav__cta">Contact</a>
      <a class="nav__ig" id="nav-ig" href="https://instagram.com/jorgeelizaldejou" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <defs><linearGradient id="ig-grad" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0" stop-color="#feda75"/><stop offset=".35" stop-color="#fa7e1e"/>
            <stop offset=".62" stop-color="#d62976"/><stop offset="1" stop-color="#962fbf"/>
          </linearGradient></defs>
          <rect x="2.8" y="2.8" width="18.4" height="18.4" rx="5.4" stroke="url(#ig-grad)" stroke-width="1.9"/>
          <circle cx="12" cy="12" r="4.1" stroke="url(#ig-grad)" stroke-width="1.9"/>
          <circle cx="17.4" cy="6.6" r="1.15" fill="url(#ig-grad)"/>
        </svg>
      </a>
    </div>
  </nav>

  <main>
    <!-- Hero -->
    <header class="hero" id="top">
      <div class="hero__inner">
        <div class="avatar" id="avatar" aria-hidden="true">JE</div>
        <p class="hero__eyebrow">Hi, I'm</p>
        <h1 class="hero__name" id="hero-name">Jorge Elizalde</h1>
        <p class="hero__role" id="hero-role">Technical Founder</p>
        <p class="hero__bio" id="hero-bio"></p>
        <div class="hero__actions">
          <button class="btn btn--primary" id="save-contact">
            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="3.2"/><circle cx="9" cy="11" r="2.1"/><path d="M5.7 16.3c.5-1.5 1.8-2.2 3.3-2.2s2.8.7 3.3 2.2"/><path d="M15 10h3.4M15 13.2h3.4"/></svg>
            <span>Save my contact</span>
          </button>
          <a class="btn btn--ghost" id="hero-cta" href="#projects">
            <span>See my work</span>
            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9.5l6 6 6-6"/></svg>
          </a>
        </div>
        <button class="hero__hint" id="game-hint" type="button">
          <svg class="hint__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="8" width="19" height="8.6" rx="4.3"/><path d="M7 11.2v2.6M5.7 12.5h2.6"/><circle cx="15.6" cy="11.7" r=".75" fill="currentColor" stroke="none"/><circle cx="17.6" cy="13.3" r=".75" fill="currentColor" stroke="none"/></svg>
          <span>Hidden game inside — <span class="hint__cta">tap to play</span></span>
        </button>
      </div>
    </header>

    <!-- Projects -->
    <section class="section" id="projects">
      <div class="section__head">
        <h2>What I'm building</h2>
        <p class="section__sub">A few products I've shipped or am shipping now.</p>
      </div>
      <div class="projects" id="projects-grid"></div>
    </section>

    <!-- Contact -->
    <section class="section section--contact" id="contact">
      <div class="section__head">
        <h2>Let's connect</h2>
        <p class="section__sub">Find me here — or save my card and reach out anytime.</p>
      </div>
      <div class="contact" id="contact-links"></div>
      <button class="btn btn--primary btn--wide" id="save-contact-2">
        <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="3.2"/><circle cx="9" cy="11" r="2.1"/><path d="M5.7 16.3c.5-1.5 1.8-2.2 3.3-2.2s2.8.7 3.3 2.2"/><path d="M15 10h3.4M15 13.2h3.4"/></svg>
        <span>Save my contact</span>
      </button>
    </section>
  </main>

  <footer class="footer">
    <span id="footer-name">Jorge Elizalde</span>
    <span class="footer__dot">·</span>
    <span id="footer-domain">wemik.com</span>
    <span class="footer__dot">·</span>
    <span>© 2026</span>
  </footer>

  <!-- Easter egg game overlay -->
  <div class="game-overlay" id="game-overlay" hidden>
    <div class="game-modal">
      <div class="game-modal__bar">
        <span class="game-modal__title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="8" width="19" height="8.6" rx="4.3"/><path d="M7 11.2v2.6M5.7 12.5h2.6"/><circle cx="15.6" cy="11.7" r=".75" fill="currentColor" stroke="none"/><circle cx="17.6" cy="13.3" r=".75" fill="currentColor" stroke="none"/></svg>
          Snake
        </span>
        <button class="game-modal__close" id="game-close" aria-label="Close game">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <canvas id="game-canvas" width="360" height="360"></canvas>
      <div class="game-modal__foot">
        <span id="game-score">Score: 0</span>
        <span class="game-modal__hint"><span id="game-status">Swipe or arrow keys to start</span></span>
      </div>
    </div>
  </div>

  <script src="config.js?v=5"></script>
  <script src="script.js?v=5"></script>
</body>
</html>
