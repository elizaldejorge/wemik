<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="PMFC — Padel Match Flow Creator">
  <rect width="1024" height="1024" fill="#0b0e16"/>
  <!-- racket -->
  <g transform="rotate(-22 470 400)">
    <!-- head outline -->
    <ellipse cx="470" cy="380" rx="150" ry="180" fill="none" stroke="#ffffff" stroke-width="26"/>
    <!-- handle -->
    <rect x="450" y="545" width="40" height="150" rx="18" fill="#ffffff"/>
    <rect x="446" y="600" width="48" height="10" rx="5" fill="#0b0e16"/>
    <rect x="446" y="625" width="48" height="10" rx="5" fill="#0b0e16"/>
    <!-- perforation holes -->
    <g fill="#ffffff">
      <circle cx="470" cy="300" r="11"/>
      <circle cx="420" cy="340" r="11"/><circle cx="470" cy="340" r="11"/><circle cx="520" cy="340" r="11"/>
      <circle cx="390" cy="385" r="11"/><circle cx="440" cy="385" r="11"/><circle cx="500" cy="385" r="11"/><circle cx="550" cy="385" r="11"/>
      <circle cx="420" cy="430" r="11"/><circle cx="470" cy="430" r="11"/><circle cx="520" cy="430" r="11"/>
      <circle cx="470" cy="475" r="11"/>
    </g>
  </g>
  <!-- ball + motion -->
  <circle cx="700" cy="300" r="62" fill="#c5e84f"/>
  <path d="M662 268 Q700 300 662 332" fill="none" stroke="#0b0e16" stroke-width="6" opacity="0.55"/>
  <g stroke="#c5e84f" stroke-width="12" stroke-linecap="round" opacity="0.9">
    <line x1="785" y1="270" x2="835" y2="262"/>
    <line x1="790" y1="305" x2="848" y2="300"/>
    <line x1="785" y1="340" x2="835" y2="346"/>
  </g>
  <!-- wordmark -->
  <text x="512" y="780" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
        font-weight="900" font-size="200" letter-spacing="6" fill="#ffffff" font-style="italic">PMFC</text>
  <line x1="300" y1="838" x2="724" y2="838" stroke="#c5e84f" stroke-width="8"/>
  <text x="512" y="888" text-anchor="middle" font-family="Arial, sans-serif"
        font-weight="700" font-size="40" letter-spacing="8" fill="#9aa0ad">PADEL MATCH FLOW</text>
</svg>
